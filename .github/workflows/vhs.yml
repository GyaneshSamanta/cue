name: Generate VHS GIFs

on:
  push:
    paths:
      - 'docs/vhs/*.tape'
      - '.github/workflows/vhs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build cue CLI
        run: |
          go build -ldflags="-s -w" -o cue .
          sudo mv cue /usr/local/bin/

      - name: Prepare assets directory
        run: mkdir -p docs/assets

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg ttyd pipx

      - name: Install VHS
        run: go install github.com/charmbracelet/vhs@latest

      - name: Generate VHS GIFs
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          vhs docs/vhs/onboarding.tape
          vhs docs/vhs/store.tape

      - name: Commit and Push GIFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(vhs): auto-generate and update terminal GIFs"
          file_pattern: "docs/assets/*.gif"
